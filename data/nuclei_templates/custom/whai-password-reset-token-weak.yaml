id: whai-password-reset-token-weak

info:
  name: Weak Password Reset Token
  author: whitehat-ai
  severity: high
  description: Detects predictable or short password reset tokens
  tags: insecure-design,auth,password-reset,high
  classification:
    cwe-id: CWE-640

http:
  - method: POST
    path:
      - "{{BaseURL}}/api/forgot-password"
      - "{{BaseURL}}/api/password/reset"

    headers:
      Content-Type: application/json

    body: '{"email":"test@example.com"}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - '"token":\\s*"[0-9]{4,6}"'
          - '"reset_code":\\s*"\\d{4}"'
        condition: or
