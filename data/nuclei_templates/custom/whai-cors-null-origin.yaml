id: whai-cors-null-origin

info:
  name: CORS Null Origin Bypass
  author: whitehat-ai
  severity: high
  description: Detects CORS configurations that accept null origin, exploitable via sandboxed iframes
  tags: cors,misconfiguration,bypass
  reference:
    - https://portswigger.net/web-security/cors

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    headers:
      Origin: "null"

    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "Access-Control-Allow-Origin: null"

      - type: word
        part: header
        words:
          - "Access-Control-Allow-Credentials: true"
