id: whai-exposed-admin-panels

info:
  name: Exposed Admin Panel Detection
  author: whitehat-ai
  severity: medium
  description: Detects publicly accessible admin panels and management interfaces
  tags: admin,panel,exposure,misconfiguration
  reference:
    - https://owasp.org/www-project-web-security-testing-guide/

http:
  - method: GET
    path:
      - "{{BaseURL}}/admin"
      - "{{BaseURL}}/admin/"
      - "{{BaseURL}}/administrator"
      - "{{BaseURL}}/admin/login"
      - "{{BaseURL}}/admin/dashboard"
      - "{{BaseURL}}/wp-admin/"
      - "{{BaseURL}}/wp-login.php"
      - "{{BaseURL}}/phpmyadmin/"
      - "{{BaseURL}}/phpMyAdmin/"
      - "{{BaseURL}}/adminer.php"
      - "{{BaseURL}}/adminer/"
      - "{{BaseURL}}/_admin"
      - "{{BaseURL}}/cp"
      - "{{BaseURL}}/controlpanel"
      - "{{BaseURL}}/manager/html"
      - "{{BaseURL}}/webadmin"
      - "{{BaseURL}}/siteadmin"
      - "{{BaseURL}}/backend"
      - "{{BaseURL}}/panel"
      - "{{BaseURL}}/jenkins"
      - "{{BaseURL}}/grafana"
      - "{{BaseURL}}/kibana"
      - "{{BaseURL}}/portainer"
      - "{{BaseURL}}/console"

    stop-at-first-match: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 301
          - 302

      - type: regex
        part: body
        regex:
          - "(?i)(admin|login|dashboard|sign.?in|log.?in|password|username)"
          - "(?i)(phpmyadmin|adminer|jenkins|grafana|kibana|portainer)"
          - "(?i)(management|control.?panel|administration)"
        condition: or
