id: whai-webpack-stats

info:
  name: Webpack Stats/Manifest Exposure
  author: whitehat-ai
  severity: medium
  description: Detects exposed webpack build stats
  tags: webpack,javascript,info-disclosure,medium
  classification:
    cwe-id: CWE-200

http:
  - method: GET
    path:
      - "{{BaseURL}}/stats.json"
      - "{{BaseURL}}/webpack-stats.json"
      - "{{BaseURL}}/asset-manifest.json"
      - "{{BaseURL}}/manifest.json"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"chunks"'
          - '"modules"'
          - '"assets"'
        condition: or
