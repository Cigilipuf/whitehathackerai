id: whai-cors-wildcard-credentials

info:
  name: CORS Wildcard with Credentials
  author: whitehat-ai
  severity: medium
  description: Detects CORS wildcard (*) combined with credentials support
  tags: cors,misconfiguration,wildcard
  reference:
    - https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS

http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/api/"
      - "{{BaseURL}}/api/v1/"
    headers:
      Origin: "https://evil-whaitest.com"

    matchers-condition: or
    matchers:
      - type: word
        part: header
        words:
          - "Access-Control-Allow-Origin: *"

      - type: regex
        part: header
        regex:
          - "(?i)access-control-allow-origin:\\s*https?://[^\\s]*evil"
