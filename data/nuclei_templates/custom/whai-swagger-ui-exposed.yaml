id: whai-swagger-ui-exposed

info:
  name: Swagger UI Exposed
  author: whitehat-ai
  severity: medium
  description: Detects exposed Swagger UI for API exploration
  tags: swagger,api,info-disclosure,medium
  classification:
    cwe-id: CWE-200

http:
  - method: GET
    path:
      - "{{BaseURL}}/swagger-ui.html"
      - "{{BaseURL}}/swagger-ui/"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/docs"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "swagger"
          - "Swagger UI"
          - "openapi"
        condition: or
