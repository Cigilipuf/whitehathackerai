id: whai-metrics-endpoint

info:
  name: Exposed Prometheus/Metrics Endpoint
  author: whitehat-ai
  severity: medium
  description: Detects exposed metrics endpoints
  tags: metrics,prometheus,misconfig,medium
  classification:
    cwe-id: CWE-200

http:
  - method: GET
    path:
      - "{{BaseURL}}/metrics"
      - "{{BaseURL}}/prometheus"
      - "{{BaseURL}}/_metrics"
      - "{{BaseURL}}/debug/vars"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "process_cpu"
          - "go_goroutines"
          - "http_requests_total"
        condition: or
