id: whai-websocket-no-auth

info:
  name: WebSocket Endpoint Without Authentication
  author: whitehat-ai
  severity: medium
  description: Detects WebSocket upgrade without auth
  tags: websocket,auth,medium
  classification:
    cwe-id: CWE-306

http:
  - method: GET
    path:
      - "{{BaseURL}}/ws"
      - "{{BaseURL}}/socket.io/"
      - "{{BaseURL}}/websocket"

    headers:
      Upgrade: websocket
      Connection: Upgrade
      Sec-WebSocket-Version: 13
      Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==

    matchers:
      - type: status
        status:
          - 101
