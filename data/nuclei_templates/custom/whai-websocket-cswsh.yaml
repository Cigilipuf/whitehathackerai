id: whai-websocket-cswsh

info:
  name: Cross-Site WebSocket Hijacking
  author: whitehat-ai
  severity: high
  description: Tests WS endpoints for missing origin validation
  tags: websocket,cswsh,high
  classification:
    cwe-id: CWE-346

http:
  - method: GET
    path:
      - "{{BaseURL}}/ws"
      - "{{BaseURL}}/websocket"

    headers:
      Upgrade: websocket
      Connection: Upgrade
      Sec-WebSocket-Version: 13
      Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==
      Origin: https://evil.com

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 101
      - type: word
        part: header
        words:
          - "upgrade"
