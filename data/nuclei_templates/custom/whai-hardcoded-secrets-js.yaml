id: whai-hardcoded-secrets-js

info:
  name: Hardcoded Secrets in JavaScript Files
  author: whitehat-ai
  severity: high
  description: Scans JavaScript files for hardcoded API keys and credentials
  tags: crypto,secrets,javascript,high
  classification:
    cwe-id: CWE-798

http:
  - method: GET
    path:
      - "{{BaseURL}}/app.js"
      - "{{BaseURL}}/main.js"
      - "{{BaseURL}}/bundle.js"
      - "{{BaseURL}}/static/js/main.js"
      - "{{BaseURL}}/dist/main.js"

    matchers:
      - type: regex
        part: body
        regex:
          - '(?i)(api[_-]?key|apikey)\s*[:=]\s*["''][a-zA-Z0-9_\-]{20,}'
          - '(?i)AKIA[0-9A-Z]{16}'
          - '(?i)(firebase|supabase|algolia|stripe)[a-zA-Z]*\s*[:=]\s*["''][a-zA-Z0-9_\-]{10,}'
        condition: or
