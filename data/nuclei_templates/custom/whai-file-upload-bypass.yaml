id: whai-file-upload-bypass

info:
  name: File Upload Extension Bypass
  author: whitehat-ai
  severity: high
  description: Tests file upload filter bypass with double extensions
  tags: upload,bypass,high
  classification:
    cwe-id: CWE-434

http:
  - method: POST
    path:
      - "{{BaseURL}}/api/upload"

    headers:
      Content-Type: multipart/form-data; boundary=----Boundary

    body: |
      ------Boundary
      Content-Disposition: form-data; name="file"; filename="test.php.jpg"
      Content-Type: image/jpeg

      <?php echo "test"; ?>
      ------Boundary--

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        negative: true
        words:
          - "rejected"
          - "not allowed"
          - "invalid"
