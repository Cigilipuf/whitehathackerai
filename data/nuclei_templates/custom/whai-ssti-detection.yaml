id: whai-ssti-detection

info:
  name: Server-Side Template Injection Detection
  author: whitehat-ai
  severity: critical
  description: Detects SSTI vulnerabilities by injecting mathematical expressions into common parameters
  tags: ssti,injection,rce,critical
  reference:
    - https://portswigger.net/web-security/server-side-template-injection
    - https://book.hacktricks.xyz/pentesting-web/ssti-server-side-template-injection

http:
  - method: GET
    path:
      - "{{BaseURL}}/?name={{7*7}}"
      - "{{BaseURL}}/?q={{7*7}}"
      - "{{BaseURL}}/?search={{7*7}}"
      - "{{BaseURL}}/?template={{7*7}}"
      - "{{BaseURL}}/?page={{7*7}}"
      - "{{BaseURL}}/?msg={{7*7}}"
      - "{{BaseURL}}/?name=${7*7}"
      - "{{BaseURL}}/?q=${7*7}"
      - "{{BaseURL}}/?name=<%= 7*7 %>"
      - "{{BaseURL}}/?name={{7*'7'}}"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "49"
          - "7777777"
        condition: or

      - type: word
        negative: true
        part: body
        words:
          - "{{7*7}}"
          - "${7*7}"
          - "<%= 7*7 %>"
        condition: and
