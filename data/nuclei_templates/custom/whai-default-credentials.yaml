id: whai-default-credentials

info:
  name: Default Credentials Detection
  author: whitehat-ai
  severity: critical
  description: Tests common services for default/weak credentials
  tags: default-credentials,authentication,bruteforce,critical
  reference:
    - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/04-Authentication_Testing/02-Testing_for_Default_Credentials

http:
  - method: POST
    path:
      - "{{BaseURL}}/api/login"
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/auth/login"
      - "{{BaseURL}}/api/auth/login"
    headers:
      Content-Type: "application/json"
    body: '{"username":"admin","password":"admin"}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: body
        regex:
          - "(?i)(token|jwt|session|access_token|auth_token|logged.?in|success|welcome)"

      - type: word
        negative: true
        part: body
        words:
          - "invalid"
          - "wrong"
          - "failed"
          - "incorrect"
          - "denied"
        condition: and

  - method: POST
    path:
      - "{{BaseURL}}/api/login"
      - "{{BaseURL}}/login"
    headers:
      Content-Type: "application/json"
    body: '{"username":"admin","password":"password"}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: body
        regex:
          - "(?i)(token|jwt|session|access_token|auth_token)"

  - method: POST
    path:
      - "{{BaseURL}}/api/login"
      - "{{BaseURL}}/login"
    headers:
      Content-Type: "application/json"
    body: '{"username":"admin","password":"123456"}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: body
        regex:
          - "(?i)(token|jwt|session|access_token|auth_token)"

  - method: POST
    path:
      - "{{BaseURL}}/api/login"
      - "{{BaseURL}}/login"
    headers:
      Content-Type: "application/json"
    body: '{"username":"root","password":"root"}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: body
        regex:
          - "(?i)(token|jwt|session|access_token|auth_token)"
