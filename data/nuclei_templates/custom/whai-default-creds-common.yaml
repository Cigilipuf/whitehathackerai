id: whai-default-creds-common

info:
  name: Default Credentials on Common Services
  author: whitehat-ai
  severity: critical
  description: Tests for default admin/admin credentials
  tags: auth,default-creds,critical
  classification:
    cwe-id: CWE-798

http:
  - method: POST
    path:
      - "{{BaseURL}}/api/login"
      - "{{BaseURL}}/login"

    headers:
      Content-Type: application/json

    body: '{"username":"admin","password":"admin"}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"token"'
          - '"session"'
          - '"success":true'
        condition: or
