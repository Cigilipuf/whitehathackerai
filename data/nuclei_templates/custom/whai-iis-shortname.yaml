id: whai-iis-shortname

info:
  name: IIS Short Filename Disclosure
  author: whitehat-ai
  severity: medium
  description: Tests for IIS 8.3 short filename disclosure
  tags: iis,info-disclosure,medium
  classification:
    cwe-id: CWE-200

http:
  - method: GET
    path:
      - "{{BaseURL}}/*~1*/.aspx"

    matchers:
      - type: status
        status:
          - 404
