# ============================================================
# Güvenlik Kuralları
# ============================================================
safety:
  # Her komut öncesi kontroller
  pre_execution_checks:
    - scope_validation
    - rate_limit_check
    - risk_level_check
    
  # Tehlike seviyesine göre onay gereksinimi
  approval_required:
    safe: false
    low: false
    medium: false          # autonomous modda otonom
    high: true             # semi-auto modda insan onayı
    critical: true         # Her zaman insan onayı
    
  # Global limitler
  limits:
    max_parallel_tools: 5
    max_requests_per_second: 10
    max_requests_per_host: 3
    
  # Timeout varsayılanları (saniye)
  timeouts:
    recon_tool: 300
    scanner: 600
    nuclei_full: 1800
    sqlmap: 900
    nmap_full: 1200
    fuzzer: 600
