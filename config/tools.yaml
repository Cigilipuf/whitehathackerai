# ============================================================
# WhiteHatHacker AI — Güvenlik Araç Tanımları
# ============================================================
# Bu dosya sistemde kullanılan tüm güvenlik araçlarını,
# kategorilerini, parametrelerini ve risk seviyelerini tanımlar.

# ============================================================
# Recon — Keşif Araçları
# ============================================================
recon:
  subdomain:
    amass:
      binary: "amass"
      category: "subdomain_enum"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      description: "Kapsamlı subdomain keşfi ve OSINT"
      default_options:
        passive_only: true
        
    subfinder:
      binary: "subfinder"
      category: "subdomain_enum"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      description: "Hızlı pasif subdomain keşfi"
      available: false  # Go runtime gerekli
      
    assetfinder:
      binary: "assetfinder"
      category: "subdomain_enum"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      available: false  # Go runtime gerekli
      
    crt_sh:
      binary: null  # API-based
      category: "subdomain_enum"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      description: "Certificate Transparency log sorgusu"

  port_scan:
    nmap:
      binary: "nmap"
      category: "port_scan"
      risk_level: "low"
      requires_root: true  # SYN scan için
      timeout: 1200
      description: "Ağ tarama ve port keşfi"
      profiles:
        stealth:
          flags: "-sS -T2 --top-ports 100 -Pn"
        balanced:
          flags: "-sV -sC -T3 --top-ports 1000 -Pn"
        aggressive:
          flags: "-sV -sC -A -T4 -p- -Pn"
          
    masscan:
      binary: "masscan"
      category: "port_scan"
      risk_level: "medium"
      requires_root: true
      timeout: 1200
      description: "Çok hızlı port tarama"
      default_options:
        rate: 1000  # paket/saniye
        
    rustscan:
      binary: "rustscan"
      category: "port_scan"
      risk_level: "low"
      requires_root: false
      timeout: 1200
      available: false  # Rust binary gerekli

  web_discovery:
    httpx:
      binary: "httpx"
      category: "web_probe"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      description: "HTTP probe ve canlılık kontrolü"
      
    waybackurls:
      binary: "waybackurls"
      category: "url_discovery"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      available: false  # Go
      
    gau:
      binary: "gau"
      category: "url_discovery"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      available: false  # Go
      
    katana:
      binary: "katana"
      category: "web_crawler"
      risk_level: "low"
      requires_root: false
      timeout: 1200
      available: false  # Go
      
    gospider:
      binary: "gospider"
      category: "web_crawler"
      risk_level: "low"
      requires_root: false
      timeout: 1200
      available: false  # Go
      
    hakrawler:
      binary: "hakrawler"
      category: "web_crawler"
      risk_level: "low"
      requires_root: false
      timeout: 1200
      available: false  # Go

  dns:
    dnsrecon:
      binary: "dnsrecon"
      category: "dns_enum"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      description: "DNS enumeration"
      
    dnsx:
      binary: "dnsx"
      category: "dns_enum"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      available: false  # Go
      
    dig:
      binary: "dig"
      category: "dns_query"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      
    fierce:
      binary: "fierce"
      category: "dns_enum"
      risk_level: "safe"
      requires_root: false
      timeout: 1200

  osint:
    theHarvester:
      binary: "theHarvester"
      category: "osint"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      description: "Email, subdomain ve bilgi toplama"
      
    shodan:
      binary: null  # API-based
      category: "osint"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      requires_api_key: true
      env_var: "SHODAN_API_KEY"
      
    whois:
      binary: "whois"
      category: "osint"
      risk_level: "safe"
      requires_root: false
      timeout: 1200

  tech_detect:
    whatweb:
      binary: "whatweb"
      category: "tech_detection"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      description: "Web teknoloji tespiti"
      
    wafw00f:
      binary: "wafw00f"
      category: "waf_detection"
      risk_level: "safe"
      requires_root: false
      timeout: 1200
      description: "WAF tespit aracı"

# ============================================================
# Scanners — Zafiyet Tarayıcıları
# ============================================================
scanners:
  nuclei:
    binary: "nuclei"
    category: "vuln_scanner"
    risk_level: "medium"
    requires_root: false
    timeout: 1800
    available: false  # Go
    description: "Template bazlı zafiyet tarama"
    
  nikto:
    binary: "nikto"
    category: "web_scanner"
    risk_level: "medium"
    requires_root: false
    timeout: 1200
    description: "Web sunucu zafiyet tarama"
    
  wpscan:
    binary: "wpscan"
    category: "cms_scanner"
    risk_level: "low"
    requires_root: false
    timeout: 1200
    description: "WordPress zafiyet tarama"
    requires_api_key: true
    env_var: "WPSCAN_API_TOKEN"
    
  sqlmap:
    binary: "sqlmap"
    category: "injection"
    risk_level: "high"
    requires_root: false
    timeout: 1200
    description: "SQL injection tespit ve exploit"
    profiles:
      stealth:
        flags: "--level=1 --risk=1 --batch --random-agent"
      balanced:
        flags: "--level=2 --risk=2 --batch --threads=4"
      aggressive:
        flags: "--level=5 --risk=3 --batch --threads=8"
        
