# ============================================================
# WhiteHatHacker AI — Example Scope Definition
# ============================================================
# Her bug bounty programı için ayrı scope dosyası oluşturulur.

program:
  name: "Example Program"
  platform: "hackerone"  # hackerone | bugcrowd | generic
  program_handle: "example_corp"
  url: "https://hackerone.com/example_corp"

scope:
  # Dahil edilecek hedefler
  in_scope:
    domains:
      - "*.example.com"
      - "api.example.com"
      - "app.example.com"
    
    ips:
      - "203.0.113.0/24"
    
    urls:
      - "https://example.com/*"
      - "https://api.example.com/v1/*"
      
    ports:
      - "80"
      - "443"
      - "8080"
      - "8443"
  
  # Hariç tutulanlar
  out_of_scope:
    domains:
      - "staging.example.com"
      - "internal.example.com"
      - "*.cdn.example.com"
    
    ips:
      - "10.0.0.0/8"
      - "192.168.0.0/16"
    
    urls:
      - "https://example.com/admin/*"
    
    # Yasaklanan test türleri
    forbidden_tests:
      - "dos"
      - "ddos"
      - "social_engineering"
      - "physical"

rules:
  # Maksimum RPS
  max_requests_per_second: 10
  
  # İzin verilen saatler (UTC)
  allowed_hours:
    start: "00:00"
    end: "23:59"
  
  # Özel notlar
  notes:
    - "Do not test accounts belonging to other users"
    - "Report any PII exposure immediately"
    - "Destructive testing is NOT allowed"

# ── Authenticated scanning (optional) ──
# Uncomment and configure to run scans with an authenticated session.
